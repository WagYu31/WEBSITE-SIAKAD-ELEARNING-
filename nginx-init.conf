# ============================================
# Nginx — TEMPORARY config for SSL setup
# Hanya dipakai saat pertama kali generate SSL
# Setelah SSL jadi, ganti dengan nginx.conf
# ============================================

server {
    listen 80;
    server_name stiabayuanggajobs.online www.stiabayuanggajobs.online;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve frontend sementara (HTTP)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /app/uploads/;
    }
}
