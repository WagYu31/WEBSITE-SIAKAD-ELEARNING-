# ============================================
# Nginx — Reverse Proxy for STIA Bayuangga
# Domain: stiabayuanggajobs.online
# ============================================

# Rate limiting zone (ISO 27001 — DDoS protection)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    server_name stiabayuanggajobs.online www.stiabayuanggajobs.online;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    server_name stiabayuanggajobs.online www.stiabayuanggajobs.online;

    # --- SSL Certificate (Let's Encrypt) ---
    ssl_certificate /etc/letsencrypt/live/stiabayuanggajobs.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stiabayuanggajobs.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- HSTS (keamanan tambahan) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Security Headers (ISO 27001) ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:;" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # --- Static Frontend ---
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- API Proxy → Go Backend ---
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # --- Upload Proxy (larger body + rate limit) ---
    location /api/profile/ {
        limit_req zone=upload burst=10 nodelay;
        client_max_body_size 5M;

        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Serve uploaded files ---
    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Health check ---
    location /health {
        proxy_pass http://app:8080/api/health;
    }

    # --- Block common attacks ---
    location ~ /\. { deny all; }
    location ~ ~$ { deny all; }
}
